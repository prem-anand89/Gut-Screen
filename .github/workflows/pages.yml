name: Deploy to GitHub Pages

# Auto-publishes the self-contained app so the live URL always reflects the
# latest committed state. Deploys on push to main (the permanent link) and to
# the active feature branch (a live preview while iterating). Pages publishes a
# single site, so the most recent push wins.
on:
  push:
    branches: [main, claude/magical-hawking-ucwqo1]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The v2 app is a single self-contained HTML file. Serve gut_screen.html
      # as index.html so it loads at the site root, and keep the original
      # filename available too. The legacy suite file is published if present.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp gut_screen.html _site/index.html
          cp gut_screen.html _site/gut_screen.html
          [ -f BM_Gut_Suite.html ] && cp BM_Gut_Suite.html _site/BM_Gut_Suite.html || true

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
