name: Deploy to GitHub Pages

# Auto-publishes the self-contained app on every push to main so the live URL
# always reflects the latest committed state.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build a tiny site dir: the app is a single self-contained HTML file.
      # Serve it as index.html so it loads at the site root, and keep the
      # original filename too so the BM_Gut_Suite.html URL also works.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp BM_Gut_Suite.html _site/index.html
          cp BM_Gut_Suite.html _site/BM_Gut_Suite.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
